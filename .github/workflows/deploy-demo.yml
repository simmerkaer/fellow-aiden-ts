name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'demo/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build the library first — the demo imports it via `file:../client`,
      # which resolves to its built dist/.
      - name: Build library
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Build demo
        working-directory: demo
        # Point the demo at your deployed proxy. Set the VITE_PROXY_URL repo
        # variable (Settings → Secrets and variables → Actions → Variables).
        env:
          VITE_PROXY_URL: ${{ vars.VITE_PROXY_URL }}
        run: |
          npm install
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
